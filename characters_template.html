<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>原神角色展示</title>
<link rel="stylesheet" href="../characters.css">
</head>
<body>
<div class="container">
<h1>uid角色</h1>
<div class="char-list" id="list">
{% for char in chars %}
<div class="char-card {{ char.ele }}">
<span class="idx">{{ loop.index }}</span>
{% set icon_name = map_dict.get(char.id, 'PlayerBoy') %}
<img class="avatar"
src="https://enka.network/ui/UI_AvatarIcon_{{ icon_name }}.png"
alt="{{ char.name }}"
onerror="this.src='https://enka.network/ui/UI_AvatarIcon_PlayerBoy.png'">
<div class="info">
<div class="name">{{ char.name }}</div>
<div class="tags">
<span class="ele {{ char.ele }}">{{ char.ele }}</span>
<span class="lvl">Lv.{{ char.lvl }}</span>
</div>
</div>
</div>
{% endfor %}
</div>
</div>

<script>
// 如果需要动态加载其他数据，可以使用这个映射
const MAP = {{ json_map|safe }};
</script>
</body>
</html>
